name: rtd-build
channels:
  - defaults
  - phygbu
  - conda-forge
dependencies:
  - sphinx-automodapi
  - asteval
  - pillow
  - sphinx-better-theme
  - lmfit
  - looseversion
  - python=3.12
  - sphinx
  - scipy >=1.14
  - numpy >=2.0
  - matplotlib >=3.8
  - matplotlib-scalebar
  - scikit-image >=0.24
  - h5py
  - cycler >=0.10.0
  - filemagic >=1.6
  - image-registration >=0.2.1
  - lmfit >=1.3
  - memoization >=0.1.4
  - npTDMS >=1.9.0
  - python-dateutil >=2.7.0
  - statsmodels
  - tabulate >=0.9
  - imreg_dft >=2.0
  - multiprocess >=0.70
  - dill >=0.2.8
  - urllib3 >=1.26
  - python-dateutil >=2.8
  - looseversion >=1.0
prefix: C:\ProgramData\anaconda3\envs\rtd-build
